<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עונות | Team Streak 7067</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        :root { --orange: #ff6600; --bg: #000; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
        }

        /* הכותרת שביקשת - כמו בדף הבית */
        h1 { 
            color: var(--orange); 
            text-shadow: 0 0 15px rgba(255, 102, 0, 0.6); 
            font-size: 3.5rem; 
            margin-top: 60px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .selector { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 10px; 
            margin: 40px 0; 
        }

        .year-btn {
            background: transparent; 
            color: var(--orange); 
            border: 2px solid var(--orange);
            padding: 10px 25px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: 0.3s;
        }

        .year-btn:hover, .year-btn.active { 
            background: var(--orange); 
            color: black; 
            box-shadow: 0 0 15px var(--orange); 
        }

        /* כרטיס המידע */
        .card {
            background: #0a0a0a; 
            border: 1px solid #333; 
            border-top: 4px solid var(--orange);
            border-radius: 12px; 
            padding: 30px; 
            width: 90%; 
            max-width: 550px; 
            margin: 0 auto;
            display: none; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.9); 
            text-align: right;
        }

        .card h2 { color: var(--orange); margin-top: 0; font-size: 2rem; }
        
        .challenge-text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #ddd;
            margin: 15px 0;
        }

        .video-btn {
            display: inline-block; 
            margin-top: 20px; 
            padding: 12px 25px;
            background: var(--orange); 
            color: black; 
            text-decoration: none;
            font-weight: bold; 
            border-radius: 6px;
            transition: 0.3s;
        }

        .video-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        .back-link {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">🏠 חזרה</a>
    
    <h1>עונות</h1>

    <div id="year-selector" class="selector"></div>

    <div id="info-card" class="card">
        <h2 id="card-title"></h2>
        <div id="card-content" class="challenge-text"></div>
    </div>

    <script>
        async function init() {
            const selector = document.getElementById('year-selector');
            const card = document.getElementById('info-card');

            try {
                // טעינת הקובץ
                const response = await fetch('seasons.xlsx?v=' + Date.now());
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                // יצירת הכפתורים
                rows.sort((a, b) => b.Year - a.Year).forEach(item => {
                    if(!item.Year) return;
                    const btn = document.createElement('button');
                    btn.className = 'year-btn';
                    btn.innerText = item.Year;
                    btn.onclick = () => {
                        document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        card.style.display = 'block';
                        
                        document.getElementById('card-title').innerText = "עונת " + item.Year;
                        document.getElementById('card-content').innerHTML = `
                            <p><strong>🎯 האתגר:</strong> ${item.Challenge || 'מעדכנים נתונים...'}</p>
                            <p><strong>🤖 הרובוט:</strong> ${item.Robot || 'מעדכנים נתונים...'}</p>
                            ${item.Video ? `<a href="${item.Video}" target="_blank" class="video-btn">🎬 לצפייה באתגר</a>` : ''}
                        `;
                    };
                    selector.appendChild(btn);
                });
            } catch (e) { console.error("Error:", e); }
        }
        window.onload = init;
    </script>
</body>
</html>
