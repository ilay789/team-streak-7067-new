<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Streak 7067 | Seasons History</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        :root { --orange: #ff6600; --bg: #000; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { color: var(--orange); text-shadow: 0 0 15px rgba(255, 102, 0, 0.5); margin-bottom: 30px; font-size: 2.5rem; }
        .selector { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .year-btn {
            background: transparent; color: var(--orange); border: 2px solid var(--orange);
            padding: 10px 20px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s;
        }
        .year-btn:hover, .year-btn.active { background: var(--orange); color: black; box-shadow: 0 0 15px var(--orange); }
        .card {
            background: #0a0a0a; border: 1px solid #333; border-top: 4px solid var(--orange);
            border-radius: 12px; padding: 25px; width: 90%; max-width: 500px; margin: 0 auto;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: right;
        }
        .card h2 { color: var(--orange); margin-top: 0; }
        .video-btn {
            display: inline-block; margin-top: 15px; padding: 10px 20px;
            background: var(--orange); color: black; text-decoration: none;
            font-weight: bold; border-radius: 5px; transition: 0.3s;
        }
    </style>
</head>
<body>

    <a href="index.html" style="color: #888; text-decoration: none; float: right;">🏠 חזרה</a>
    <h1>היסטוריית עונות 🗓️</h1>

    <div id="year-selector" class="selector"></div>

    <div id="info-card" class="card">
        <h2 id="card-title"></h2>
        <div id="card-content"></div>
    </div>

    <script>
        async function init() {
            const selector = document.getElementById('year-selector');
            const card = document.getElementById('info-card');

            try {
                const response = await fetch('seasons.xlsx?v=' + Math.random());
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                rows.sort((a, b) => b.Year - a.Year).forEach(item => {
                    if(!item.Year) return;
                    const btn = document.createElement('button');
                    btn.className = 'year-btn';
                    btn.innerText = item.Year;
                    btn.onclick = () => {
                        document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        card.style.display = 'block';
                        document.getElementById('card-title').innerText = "עונת " + item.Year;
                        document.getElementById('card-content').innerHTML = `
                            <p><strong>🎯 אתגר:</strong> ${item.Challenge || 'מידע בקרוב'}</p>
                            <p><strong>🤖 רובוט:</strong> ${item.Robot || 'מידע בקרוב'}</p>
                            ${item.Video ? `<a href="${item.Video}" target="_blank" class="video-btn">🎬 סרטון האתגר</a>` : ''}
                        `;
                    };
                    selector.appendChild(btn);
                });
            } catch (e) { console.error("Error loading seasons:", e); }
        }
        window.onload = init;
    </script>
</body>
</html>
